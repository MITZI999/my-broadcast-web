<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITZII BROADCAST BOT | v4.0</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d00ff;
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .panel {
            width: 95%;
            max-width: 500px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
            padding: 35px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            z-index: 1;
        }

        .title {
            font-size: 2.5em;
            margin: 0;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .dev-label { color: #64748b; font-size: 0.8em; letter-spacing: 5px; margin-bottom: 20px; }

        .status-box {
            background: rgba(0, 210, 255, 0.1);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85em;
            color: var(--neon-blue);
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            margin-bottom: 20px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: bold;
            color: #94a3b8;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }

        select, input, textarea {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        select { width: 120px; cursor: pointer; }

        .file-input {
            margin-bottom: 15px;
            font-size: 0.8em;
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            border: 1px dashed var(--glass-border);
        }

        .btn-exec {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-exec:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-exec:disabled { opacity: 0.5; }

        .footer { margin-top: 25px; font-size: 0.7em; color: #475569; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="panel">
        <h1 class="title">GROUP BROADCAST</h1>
        <div class="dev-label">DEV MITZII</div>

        <div class="status-box" id="info">🎵 Click anywhere to start playlist</div>

        <div class="tabs">
            <div class="tab active" id="t-p" onclick="show('p')">PAIRING</div>
            <div class="tab" id="t-b" onclick="show('b')">BROADCASTER</div>
        </div>

        <div id="sec-p">
            <div class="input-group">
                <select id="country-code">
                    <option value="94">🇱🇰 +94</option>
                    <option value="91">🇮🇳 +91</option>
                    <option value="1">🇺🇸 +1</option>
                    <option value="44">🇬🇧 +44</option>
                </select>
                <input type="tel" id="phone" placeholder="7xxxxxxxx">
            </div>
            <button class="btn-exec" onclick="getPair()">Get Pairing Code 🔑</button>
        </div>

        <div id="sec-b" style="display:none;">
            <input type="text" id="glink" placeholder="WhatsApp Group Link 🔗" style="margin-bottom:15px;">
            <textarea id="msg" rows="3" placeholder="Enter Broadcast Message... 📝"></textarea>
            
            <div class="file-input">
                <label>Attach Photo (Optional) 🖼️</label>
                <input type="file" id="photo" accept="image/*" style="margin-top:5px; border:none; background:none;">
            </div>

            <button class="btn-exec" id="exec-btn" onclick="runBot()">Execute Bot 🚀</button>
        </div>

        <div class="footer">SYSTEM v4.0 ACTIVE | © 2026 MITZII</div>
    </div>

    <audio id="player" loop></audio>

    <script>
        // Directly using your Server IP to avoid DNS/SSL issues
        const SERVER_URL = "http://154.26.130.68:25664"; 

        // UI Toggle
        function show(mode) {
            document.getElementById('sec-p').style.display = mode === 'p' ? 'block' : 'none';
            document.getElementById('sec-b').style.display = mode === 'b' ? 'block' : 'none';
            document.getElementById('t-p').classList.toggle('active', mode === 'p');
            document.getElementById('t-b').classList.toggle('active', mode === 'b');
        }

        // Music Playlist
        const tracks = [
            "https://files.catbox.moe/v9sf7s.mp3", 
            "https://files.catbox.moe/opwpwr.mp3",
            "https://files.catbox.moe/6pr0gr.mp3"
        ];
        const audio = document.getElementById('player');
        window.onclick = () => { 
            if(audio.paused) { 
                audio.src = tracks[Math.floor(Math.random() * tracks.length)]; 
                audio.play(); 
                document.getElementById('info').innerText = "🎵 Playlist Streaming Active";
            } 
        };

        // Pairing Code Logic
        async function getPair() {
            const code = document.getElementById('country-code').value;
            const num = document.getElementById('phone').value;
            if(!num) return alert("Please enter phone number!");
            
            document.getElementById('info').innerText = "⏳ Generating Code...";
            try {
                // Fetch directly from IP
                const res = await fetch(`${SERVER_URL}/get-pair?number=${code}${num}`);
                const data = await res.json();
                if(data.code) {
                    alert("YOUR CODE: " + data.code);
                    document.getElementById('info').innerText = "✅ Pairing Code Received";
                } else if(data.error) {
                    alert(data.error);
                    document.getElementById('info').innerText = "❌ Registration Error";
                }
            } catch (e) { 
                alert("Connection Error! Make sure to 'Allow Insecure Content' in browser settings."); 
                document.getElementById('info').innerText = "❌ Server Link Blocked";
            }
        }

        // Broadcaster Logic
        async function runBot() {
            const link = document.getElementById('glink').value;
            const msg = document.getElementById('msg').value;
            const fileInput = document.getElementById('photo');
            const btn = document.getElementById('exec-btn');

            if(!link || !msg) return alert("Fill required fields!");

            btn.disabled = true;
            btn.innerText = "Processing...";
            document.getElementById('info').innerText = "🚀 Sending Broadcast...";

            const formData = new FormData();
            formData.append('inviteLink', link);
            formData.append('message', msg);
            if(fileInput.files[0]) formData.append('image', fileInput.files[0]);

            try {
                const res = await fetch(`${SERVER_URL}/broadcast`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                alert(data.status === "Success" ? "✅ Broadcast Sent!" : "❌ Error: " + data.error);
            } catch (e) { alert("Transmission Error! Check if server is running."); }
            finally { 
                btn.disabled = false; 
                btn.innerText = "Execute Bot 🚀";
                document.getElementById('info').innerText = "✅ Task Completed";
            }
        }

        // Particle Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let dots = [];
        for(let i=0; i<40; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, dx: (Math.random()-0.5)*0.5, dy: (Math.random()-0.5)*0.5});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "#00d2ff33";
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, 1.2, 0, Math.PI*2); ctx.fill();
                d.x += d.dx; d.y += d.dy;
                if(d.x<0 || d.x>canvas.width) d.dx*=-1; if(d.y<0 || d.y>canvas.height) d.dy*=-1;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
