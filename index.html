<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITZII BROADCAST BOT | v3.5</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d00ff;
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .panel {
            width: 90%;
            max-width: 480px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .title {
            font-size: 2.2em;
            margin: 0;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .dev-tag {
            color: #94a3b8;
            font-size: 0.75em;
            letter-spacing: 4px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .status-display {
            background: rgba(0, 210, 255, 0.08);
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 0.85em;
            color: var(--neon-blue);
            border: 1px dashed rgba(0, 210, 255, 0.3);
            transition: 0.3s;
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.4);
            border-radius: 14px;
            margin-bottom: 25px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border-radius: 10px;
            font-size: 0.85em;
            font-weight: 700;
            color: #64748b;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }

        input, textarea {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
            font-size: 0.95em;
            transition: border 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--neon-blue); }

        .btn-action {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 800;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-action:active { transform: translateY(0); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer { margin-top: 25px; font-size: 0.7em; color: #475569; letter-spacing: 1px; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="panel">
        <h1 class="title">BROADCAST BOT</h1>
        <div class="dev-tag">DEV MITZII</div>

        <div class="status-display" id="info-bar">🎵 Interaction required for music</div>

        <div class="tabs">
            <div class="tab active" id="tab-p" onclick="switchView('pairing')">PAIRING</div>
            <div class="tab" id="tab-b" onclick="switchView('broadcast')">BROADCAST</div>
        </div>

        <div id="view-pairing">
            <input type="tel" id="input-phone" placeholder="Phone Number (e.g. 947xxxxxxxx)">
            <button class="btn-action" onclick="fetchPairCode()">Request Pairing Code</button>
        </div>

        <div id="view-broadcast" style="display:none;">
            <input type="text" id="input-link" placeholder="WhatsApp Group Invite Link">
            <textarea id="input-msg" rows="3" placeholder="Type your broadcast message here..."></textarea>
            <button class="btn-action" id="btn-exec" onclick="triggerBroadcast()">Execute Broadcast</button>
        </div>

        <div class="footer">SYSTEM v3.5 | SECURE ENCRYPTION ACTIVE</div>
    </div>

    <audio id="bg-player" loop></audio>

    <script>
        // Server Configuration from your Pterodactyl Address
        const SERVER_URL = "http://senuhosting.senumodz.shop:25664"; 

        // View Switcher
        function switchView(mode) {
            document.getElementById('view-pairing').style.display = mode === 'pairing' ? 'block' : 'none';
            document.getElementById('view-broadcast').style.display = mode === 'broadcast' ? 'block' : 'none';
            document.getElementById('tab-p').classList.toggle('active', mode === 'pairing');
            document.getElementById('tab-b').classList.toggle('active', mode === 'broadcast');
        }

        // Music Engine
        const playlist = [
            "https://files.catbox.moe/v9sf7s.mp3", 
            "https://files.catbox.moe/opwpwr.mp3",
            "https://files.catbox.moe/6pr0gr.mp3"
        ];
        const audio = document.getElementById('bg-player');
        window.addEventListener('click', () => { 
            if(audio.paused) { 
                audio.src = playlist[0]; 
                audio.play(); 
                document.getElementById('info-bar').innerText = "🎵 Playlist Streaming Active";
            } 
        }, { once: true });

        // Pairing Logic
        async function fetchPairCode() {
            const num = document.getElementById('input-phone').value;
            if(!num) return alert("Please enter your phone number first!");
            
            document.getElementById('info-bar').innerText = "⏳ Generating unique code...";
            try {
                const res = await fetch(`${SERVER_URL}/get-pair?number=${num}`);
                const data = await res.json();
                if(data.code) {
                    alert("YOUR WHATSAPP PAIRING CODE: " + data.code);
                    document.getElementById('info-bar').innerText = "✅ Pairing Code Received";
                } else {
                    alert("Server Error: " + data.error);
                }
            } catch (err) {
                alert("Cannot connect to server. Ensure your Panel is START/ONLINE.");
            }
        }

        // Broadcast Logic
        async function triggerBroadcast() {
            const link = document.getElementById('input-link').value;
            const msg = document.getElementById('input-msg').value;
            const btn = document.getElementById('btn-exec');

            if(!link || !msg) return alert("Please provide both Group Link and Message.");

            btn.disabled = true;
            btn.innerText = "Processing...";
            document.getElementById('info-bar').innerText = "🚀 Deploying broadcast payload...";

            try {
                const res = await fetch(`${SERVER_URL}/broadcast`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ inviteLink: link, message: msg })
                });
                const data = await res.json();
                if(data.status === "Success") {
                    alert("✅ Broadcast Sent Successfully!");
                    document.getElementById('info-bar').innerText = "✅ Mission Accomplished";
                } else {
                    alert("❌ Transmission Failed: " + data.error);
                }
            } catch (err) {
                alert("Communication error with Backend!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Execute Broadcast";
            }
        }

        // Particle Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<45; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4});
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "#00d2ff33";
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 1.2, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1; if(p.y<0 || p.y>canvas.height) p.vy*=-1;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
