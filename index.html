<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROUP BROADCAST | DEV MITZII</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d00ff;
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 🌌 Ultra-Fast Particle Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* ⌚ Top Info Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            font-family: 'monospace';
            font-size: 0.9em;
            color: var(--neon-blue);
            letter-spacing: 1px;
        }

        /* 📦 Main Layout */
        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            width: 95%;
            max-width: 1000px;
            z-index: 1;
        }

        .panel {
            flex: 1.2;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 👧 Anime Character Animation */
        .anime-side {
            flex: 0.8;
            display: flex;
            justify-content: center;
            animation: float 4s ease-in-out infinite;
        }

        .anime-img {
            width: 100%;
            max-width: 380px;
            filter: drop-shadow(0 0 25px var(--neon-blue));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        /* 🚀 Main Header */
        .title {
            font-size: 3.2em;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00d2ff, #9d00ff, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .dev {
            color: #94a3b8;
            font-size: 0.8em;
            letter-spacing: 6px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* 🔘 Functional Tabs */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.4);
            border-radius: 18px;
            padding: 6px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border-radius: 14px;
            font-weight: bold;
            transition: 0.3s;
            color: #64748b;
        }

        .tab.active {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* 📋 Inputs & Options */
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .row { display: flex; gap: 10px; margin-bottom: 15px; }

        select, input, textarea {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 14px;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            font-size: 0.95em;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        select { width: 45%; cursor: pointer; }

        /* 🚀 Executive Action Button */
        .btn-run {
            width: 100%;
            padding: 20px;
            background: linear-gradient(45deg, #00d2ff, #9d00ff);
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(157, 0, 255, 0.3);
            margin-top: 10px;
        }

        .btn-run:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
            letter-spacing: 2px;
        }

        .footer { margin-top: 30px; font-size: 0.7em; color: #475569; letter-spacing: 1px; }

        @media (max-width: 850px) {
            .wrapper { flex-direction: column-reverse; }
            .anime-img { max-width: 200px; }
            .title { font-size: 2.2em; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="top-bar">
        <span id="live-clock">00:00:00 AM</span>
        <span style="color: #4ade80;">● SPEED: 1.2ms</span>
    </div>

    <div class="wrapper">
        <div class="panel">
            <h1 class="title">GROUP BROADCAST</h1>
            <div class="dev">DEV MITZII</div>

            <div class="tabs">
                <div class="tab active" onclick="setTab(0)">BROADCASTER</div>
                <div class="tab" onclick="setTab(1)">PAIRING</div>
                <div class="tab" onclick="setTab(2)">SETTINGS</div>
            </div>

            <div id="view0" class="section active">
                <div class="row">
                    <select id="country-code">
                        <option value="+94">🇱🇰 +94 (SL)</option>
                        <option value="+91">🇮🇳 +91 (IN)</option>
                        <option value="+1">🇺🇸 +1 (US)</option>
                        <option value="+44">🇬🇧 +44 (UK)</option>
                        <option value="+92">🇵🇰 +92 (PK)</option>
                        <option value="+62">🇮🇩 +62 (ID)</option>
                    </select>
                    <input type="text" placeholder="WhatsApp Group Link">
                </div>
                <textarea rows="3" placeholder="Enter Broadcast Message..."></textarea>
                <div class="row">
                    <input type="file" id="media" style="font-size: 0.8em;">
                </div>
                <button class="btn-run" onclick="execute()">EXECUTE BOT</button>
            </div>

            <div id="view1" class="section">
                <input type="tel" placeholder="Phone Number (e.g. 7XXXXXXXX)" style="margin-bottom: 20px; text-align: center;">
                <button class="btn-run">GENERATE PAIR CODE</button>
            </div>

            <div id="view2" class="section">
                <div class="row" style="text-align: left; font-size: 0.8em; opacity: 0.7;">
                    <label>Auto-Read: ON</label><br>
                    <label>Anti-Ban: ACTIVE</label><br>
                    <label>Proxy: ENABLED</label>
                </div>
            </div>

            <div class="footer">SYSTEM v3.0 | BY DEV MITZII © 2026</div>
        </div>

        <div class="anime-side">
            <img src="https://www.pngarts.com/files/12/Anime-Girl-Manga-PNG-Image-Background.png" class="anime-img" alt="Mitzii Anime">
        </div>
    </div>

    <script>
        // ⌚ Clock Function
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // 🔘 Tab Logic
        function setTab(idx) {
            document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        }

        // 🚀 Mock Execution
        function execute() {
            alert("Broadcast Engine Started Successfully!");
        }

        // 🌌 High-Performance Background Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            for (let i = 0; i < 70; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    sz: Math.random() * 2,
                    dx: (Math.random() - 0.5) * 1.2,
                    dy: (Math.random() - 0.5) * 1.2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00d2ff";
            dots.forEach(d => {
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.sz, 0, Math.PI * 2);
                ctx.fill();
                d.x += d.dx; d.y += d.dy;
                if (d.x < 0 || d.x > canvas.width) d.dx *= -1;
                if (d.y < 0 || d.y > canvas.height) d.dy *= -1;
            });
            requestAnimationFrame(animate);
        }

        window.onresize = init;
        init(); animate();
    </script>
</body>
</html>
