<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROUP BROADCAST | DEV MITZII</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d00ff;
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            font-family: 'monospace';
            font-size: 0.9em;
            color: var(--neon-blue);
        }

        .panel {
            width: 95%;
            max-width: 550px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            z-index: 1;
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 3em;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(90deg, #00d2ff, #9d00ff, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .dev {
            color: #94a3b8;
            font-size: 0.8em;
            letter-spacing: 5px;
            margin-bottom: 25px;
        }

        /* 🎵 Music Status Display */
        .music-info {
            background: rgba(0, 210, 255, 0.1);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px dashed var(--neon-blue);
            font-size: 0.85em;
            color: var(--neon-blue);
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.4);
            border-radius: 18px;
            padding: 5px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border-radius: 14px;
            font-weight: bold;
            transition: 0.3s;
            color: #64748b;
        }

        .tab.active {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .section { display: none; }
        .section.active { display: block; }

        input, textarea, select {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
        }

        .btn-run {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #00d2ff, #9d00ff);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(157, 0, 255, 0.2);
        }

        .btn-run:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .footer { margin-top: 25px; font-size: 0.7em; color: #475569; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="top-bar">
        <span id="clock">00:00:00</span>
        <span style="color: #4ade80;">● SPEED: 1.2ms</span>
    </div>

    <div class="panel">
        <h1 class="title">GROUP BROADCAST</h1>
        <div class="dev">DEV MITZII</div>

        <div class="music-info" id="music-status">
            🎵 Click anywhere to start playlist
        </div>

        <div class="tabs">
            <div class="tab active" onclick="setTab(0)">BROADCAST</div>
            <div class="tab" onclick="setTab(1)">PAIRING</div>
        </div>

        <div id="view0" class="section active">
            <div style="display: flex; gap: 10px;">
                <select style="width: 40%;">
                    <option>🇱🇰 +94</option>
                    <option>🇮🇳 +91</option>
                    <option>🇺🇸 +1</option>
                </select>
                <input type="text" placeholder="Group Link">
            </div>
            <textarea rows="3" placeholder="Message..."></textarea>
            <button class="btn-run">EXECUTE BOT</button>
        </div>

        <div id="view1" class="section">
            <input type="tel" placeholder="947XXXXXXXX" style="text-align: center;">
            <button class="btn-run">GET CODE</button>
        </div>

        <div class="footer">SYSTEM v3.0 | BY DEV MITZII © 2026</div>
    </div>

    <audio id="player"></audio>

    <script>
        // 1. Live Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // 2. Tab Logic
        function setTab(idx) {
            document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        }

        // 3. 🎵 High-Performance Music Playlist Logic
        const playlist = [
            "https://files.catbox.moe/v9sf7s.mp3",
            "https://files.catbox.moe/opwpwr.mp3",
            "https://files.catbox.moe/e7ut2m.mp3", // Fixed extension from .mp to .mp3
            "https://files.catbox.moe/6pr0gr.mp3",
            "https://files.catbox.moe/1mubb9.mp3"
        ];

        let currentIdx = 0;
        const player = document.getElementById('player');
        const status = document.getElementById('music-status');

        function playNext() {
            player.src = playlist[currentIdx];
            status.innerText = "🎵 Playing Track: " + (currentIdx + 1) + " / " + playlist.length;
            player.play().catch(() => {
                status.innerText = "🎵 Click to start playlist";
            });
        }

        player.onended = () => {
            currentIdx = (currentIdx + 1) % playlist.length;
            playNext();
        };

        // Auto-start on first interaction
        window.addEventListener('click', () => {
            if (player.paused) playNext();
        }, { once: true });

        // 4. Background Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<60; i++) {
                dots.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    sz: Math.random()*2,
                    dx: (Math.random()-0.5)*1,
                    dy: (Math.random()-0.5)*1
                });
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#00d2ff";
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.sz, 0, Math.PI*2); ctx.fill();
                d.x += d.dx; d.y += d.dy;
                if(d.x<0 || d.x>canvas.width) d.dx*=-1;
                if(d.y<0 || d.y>canvas.height) d.dy*=-1;
            });
            requestAnimationFrame(draw);
        }
        window.onresize = init; init(); draw();
    </script>
</body>
</html>
