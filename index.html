<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>DEV MITZII | WA BROADCASTER</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', 'unarth', sans-serif; background: #020617; color: white; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* අභ්‍යවකාශ පසුබිම් සජීවීකරණය */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: move 50s linear infinite; }
        @keyframes move { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; width: 450px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { color: #22d3ee; letter-spacing: 2px; text-shadow: 0 0 15px rgba(34, 211, 238, 0.5); }
        textarea { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #334155; color: white; padding: 15px; border-radius: 15px; margin: 20px 0; outline: none; box-sizing: border-box; font-size: 1em; }
        button { width: 100%; padding: 15px; border: none; border-radius: 15px; background: #22d3ee; color: #083344; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1em; }
        button:hover { background: #67e8f9; transform: scale(1.02); }
        .status-box { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 0.9em; color: #94a3b8; }
        #qrImg { width: 220px; margin: 20px auto; border: 5px solid white; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>
    <div class="glass-panel">
        <h1>DEV MITZII</h1>
        <p>WhatsApp Group Broadcaster</p>

        <div id="authDiv">
            <img id="qrImg" style="display:none;">
            <div id="authStatus">QR Code එක සකස් වෙමින් පවතී...</div>
        </div>

        <div id="mainDiv" style="display:none;">
            <textarea id="msg" rows="5" placeholder="යැවිය යුතු පණිවිඩය මෙතන ලියන්න..."></textarea>
            <button onclick="send()">පණිවිඩ යැවීම අරඹන්න</button>
            <div class="status-box" id="status">තත්ත්වය: රැඳී සිටිනවා...</div>
        </div>
    </div>

    <script>
        // තරු නිර්මාණය කිරීම
        const field = document.getElementById('starField');
        for (let i = 0; i < 150; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = Math.random() * 3 + 'px';
            s.style.height = s.style.width;
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.animationDuration = (Math.random() * 50 + 50) + 's';
            field.appendChild(s);
        }

        async function update() {
            const res = await fetch('/api/qr');
            const data = await res.json();
            if (data.connected) {
                document.getElementById('authDiv').style.display = 'none';
                document.getElementById('mainDiv').style.display = 'block';
            } else if (data.qr) {
                const img = document.getElementById('qrImg');
                img.src = data.qr;
                img.style.display = 'block';
                document.getElementById('authStatus').innerText = "මෙම QR එක ස්කෑන් කර WhatsApp සම්බන්ධ කරන්න.";
            }
            
            const sRes = await fetch('/api/status');
            const sData = await sRes.json();
            document.getElementById('status').innerText = "තත්ත්වය: " + sData.status;
        }

        async function send() {
            const message = document.getElementById('msg').value;
            if(!message) return alert("කරුණාකර පණිවිඩයක් ඇතුළත් කරන්න!");
            await fetch('/api/broadcast', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message })
            });
            alert("Broadcast ඇරඹුවා!");
        }

        setInterval(update, 3000);
    </script>
</body>
</html>
