<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEV MITZII | ULTIMATE WHATSAPP TOOL</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #020617;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ✨ Animated Space Background with Glowing Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: move 50s linear infinite, glow 3s ease-in-out infinite alternate;
        }

        @keyframes move {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        @keyframes glow {
            0% { opacity: 0.3; box-shadow: 0 0 5px white; }
            100% { opacity: 1; box-shadow: 0 0 15px white, 0 0 25px rgba(0, 255, 255, 0.5); }
        }

        /* 📦 Multi-Tab Main Container with Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            transition: 0.5s ease-in-out;
        }

        /* 👑 DEV MITZII Header with Neon Glow */
        h1 {
            color: #22d3ee;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.8), 0 0 30px rgba(34, 211, 238, 0.5);
            margin-bottom: 5px;
            font-size: 2.5em;
        }

        p {
            color: #94a3b8;
            font-size: 1.1em;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 🏷️ Tab Button Styling */
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            padding: 10px 20px;
            border-radius: 10px;
        }

        .tab-btn.active, .tab-btn:hover {
            color: #22d3ee;
            background: rgba(34, 211, 238, 0.1);
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        /* 📄 Content Area with Smooth Transitions */
        .content-area {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .content-area.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ✍️ Input, Textarea, & File Upload Styling */
        input, textarea, select {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid #334155;
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
            font-size: 1.1em;
        }

        input:focus, textarea:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }

        /* 📸 Photo Upload Input & Preview */
        .file-input {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #334155;
            border-radius: 15px;
            padding: 15px;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .file-input:hover {
            background: rgba(34, 211, 238, 0.1);
            border-color: #22d3ee;
        }

        #imagePreview {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
            border: 2px solid #22d3ee;
        }

        /* 🚀 Action Buttons */
        .action-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg, #00ffff, #00ccff);
            color: #0a192f;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.3em;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
        }

        .action-btn:hover {
            background: linear-gradient(45deg, #67e8f9, #22d3ee);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 255, 255, 0.5);
        }

        /* 📊 Status & Info Boxes */
        .info-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(34, 211, 238, 0.1);
            border: 2px dashed #22d3ee;
            border-radius: 15px;
            color: #fff;
            display: none;
            font-size: 1em;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9em;
            color: #64748b;
        }

        /* 📸 Device Preview Images in Broadcaster */
        .device-preview {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .device-preview img {
            width: 100px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="stars" id="starField"></div>

    <div class="glass-panel">
        <h1>DEV MITZII</h1>
        <p>ULTIMATE WHATSAPP TOOL</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('broadcaster')">📢 Broadcast</button>
            <button class="tab-btn" onclick="showTab('contacts')">👤 Contacts</button>
            <button class="tab-btn" onclick="showTab('pair')">🔗 Pair</button>
        </div>

        <div id="broadcaster" class="content-area active">
            <textarea id="broadcastMsg" rows="5" placeholder="සියලුම ගෲප් වලට යැවිය යුතු පණිවිඩය මෙතන ලියන්න..."></textarea>
            
            <label class="file-input" for="broadcastPhoto">
                📸 පින්තූරයක් එක් කරන්න (විකල්ප)
            </label>
            <input type="file" id="broadcastPhoto" accept="image/*" style="display:none;" onchange="previewImage(this, 'imagePreview')">
            <img id="imagePreview" alt="පින්තූර පෙරදසුන">

            <select id="broadcastTarget">
                <option value="allGroups">All Participating Groups</option>
                <option value="contactsOnly">Contacts Only</option>
                <option value="both">All Groups & Contacts</option>
            </select>
            <button class="action-btn" onclick="startBroadcast()">START BROADCAST</button>
            <div class="status" id="broadcastStatus">තත්ත්වය: රැඳී සිටිනවා...</div>
        </div>

        <div id="contacts" class="content-area">
            <textarea id="contactList" rows="5" placeholder="අංක ලැයිස්තුව මෙතන ලියන්න (එක් පේළියකට එක් අංකයක්)..."></textarea>
            <button class="action-btn" onclick="sendToContacts()">SEND MESSAGE</button>
            <div class="status" id="contactStatus">තත්ත්වය: රැඳී සිටිනවා...</div>
        </div>

        <div id="pair" class="content-area">
            <input type="tel" id="phoneNumber" placeholder="ඔබේ අංකය ඇතුළත් කරන්න (947XXXXXXXX)">
            <button class="action-btn" onclick="getPairCode()">GET PAIRING CODE</button>
            <div id="pairCodeDisplay" class="info-box"></div>
            <div class="status" id="pairStatus">තත්ත්වය: රැඳී සිටිනවා...</div>
        </div>
    </div>

    <script>
        // Star animation logic
        const field = document.getElementById('starField');
        for (let i = 0; i < 150; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = Math.random() * 3 + 'px';
            s.style.height = s.style.width;
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.animationDuration = (Math.random() * 50 + 20) + 's';
            field.appendChild(s);
        }

        // Tab switching logic
        function showTab(tabId) {
            document.querySelectorAll('.content-area').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // Image preview logic
        function previewImage(input, previewId) {
            const file = input.files[0];
            const preview = document.getElementById(previewId);
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            } else {
                preview.src = '';
                preview.style.display = 'none';
            }
        }

        // Task handling logic (Connect with your Node.js server)
        const BACKEND_URL = "YOUR_BACKEND_SERVER_URL"; // ඔබේ VPS හෝ Render Server URL එක මෙතැනට දාන්න.

        async function startBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            const target = document.getElementById('broadcastTarget').value;
            const photoInput = document.getElementById('broadcastPhoto');
            const status = document.getElementById('broadcastStatus');

            if (!msg) return alert("කරුණාකර පණිවිඩය ඇතුළත් කරන්න!");

            status.innerText = "සම්බන්ධ වෙමින් පවතී... කරුණාකර රැඳී සිටින්න.";
            
            // Send data to backend (broadcasting will happen in backend)
            alert("Broadcast started! Check your terminal for Pairing/QR.");
        }

        async function getPairCode() {
            const num = document.getElementById('phoneNumber').value;
            const status = document.getElementById('pairStatus');
            const display = document.getElementById('pairCodeDisplay');

            if (!num) return alert("කරුණාකර අංකය ඇතුළත් කරන්න!");

            status.innerText = "සම්බන්ධ වෙමින් පවතී... කරුණාකර රැඳී සිටින්න.";
            
            // Connect with backend server to get the pairing code
            alert("Connecting to server to get pairing code...");
        }
    </script>
</body>
</html>
